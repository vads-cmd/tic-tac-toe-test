<!doctype html><html data-theme="light" dir="ltr" lang="en"><head><meta charset="utf-8"><meta content="width=device-width,initial-scale=1" name="viewport"><title>Tic-Tac-Toe</title><style>:root{--bg:#f3f4fb;--bg-grad:radial-gradient(1200px 600px at 50% -10%, #e6ecff 0%, transparent 60%);--surface:#ffffff;--surface-2:#f4f6fb;--surface-3:#eef1f8;--text:#1b1f2a;--muted:#6b7385;--border:#e3e6ee;--hairline:rgba(15, 18, 28, 0.06);--primary:#4b6bff;--primary-soft:rgba(75, 107, 255, 0.12);--primary-text:#ffffff;--accent:#f25e7a;--accent-soft:rgba(242, 94, 122, 0.14);--danger:#e0443c;--danger-soft:rgba(224, 68, 60, 0.12);--ok:#2e7d32;--ok-soft:rgba(46, 125, 50, 0.12);--hint:#f4c542;--win:#6fcf97;--shadow-sm:0 1px 2px rgba(15, 18, 28, 0.04);--shadow-md:0 1px 2px rgba(15, 18, 28, 0.05),0 12px 28px rgba(15, 18, 28, 0.06);--radius-sm:8px;--radius-md:12px;--radius-lg:18px;--radius-pill:999px}[data-theme=dark]{--bg:#0b0d12;--bg-grad:radial-gradient(1200px 600px at 50% -10%, #1a2240 0%, transparent 60%);--surface:#161a22;--surface-2:#1d222c;--surface-3:#232936;--text:#e7eaf0;--muted:#98a1b3;--border:#2a303c;--hairline:rgba(255, 255, 255, 0.06);--primary:#7b97ff;--primary-soft:rgba(123, 151, 255, 0.18);--primary-text:#0b1020;--accent:#ff7d96;--accent-soft:rgba(255, 125, 150, 0.18);--danger:#ff6b6b;--danger-soft:rgba(255, 107, 107, 0.16);--ok:#7bd88f;--ok-soft:rgba(123, 216, 143, 0.16);--hint:#f6c453;--shadow-sm:0 1px 2px rgba(0, 0, 0, 0.3);--shadow-md:0 1px 2px rgba(0, 0, 0, 0.35),0 16px 36px rgba(0, 0, 0, 0.45)}*{box-sizing:border-box}body,html{margin:0;padding:0;background:var(--bg);background-image:var(--bg-grad);background-attachment:fixed;color:var(--text);font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Vazirmatn,Tahoma,sans-serif;font-size:15px;line-height:1.5;min-height:100%;-webkit-font-smoothing:antialiased}[lang=fa] body{font-family:Vazirmatn,Tahoma,system-ui,sans-serif}.muted{color:var(--muted)}.app{max-width:640px;margin:40px auto;padding:24px;background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);display:grid;gap:20px}.app__header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding-bottom:16px;border-bottom:1px solid var(--hairline)}.app__brand h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.01em}.app__brand p{margin:2px 0 0;font-size:13px;color:var(--muted)}.app__settings{display:flex;align-items:center;gap:8px}.app__settings .field{display:flex;align-items:center;gap:0}.app__settings .field>span{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.app__settings .field select{padding:7px 28px 7px 10px;font-size:13px;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 14px) 50%,calc(100% - 9px) 50%;background-size:5px 5px,5px 5px;background-repeat:no-repeat}[dir=rtl] .app__settings .field select{padding:7px 10px 7px 28px;background-position:14px 50%,9px 50%}.app__settings .btn{padding:7px 14px;font-size:13px}.field{display:grid;gap:6px;font-size:12px;color:var(--muted);font-weight:500;letter-spacing:.02em;text-transform:uppercase}.field--inline{font-size:12px}.field input,.field select{appearance:none;padding:9px 12px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-weight:500;text-transform:none;letter-spacing:normal;transition:border-color 120ms,box-shadow 120ms;min-width:0}.field input::placeholder{color:var(--muted);opacity:.7}.field input:focus,.field select:focus{outline:0;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}.btn{appearance:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);padding:9px 14px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background 120ms,border-color 120ms,transform 80ms,box-shadow 120ms,color 120ms}.btn:hover{background:var(--surface-3)}.btn:active{transform:translateY(1px)}.btn:focus-visible{outline:0;box-shadow:0 0 0 3px var(--primary-soft)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}.btn--primary{background:var(--primary);color:var(--primary-text);border-color:transparent;box-shadow:0 1px 0 rgba(255,255,255,.15) inset,var(--shadow-sm)}.btn--primary:hover{background:var(--primary);filter:brightness(1.06)}.btn--danger{background:0 0;color:var(--danger);border-color:var(--border)}.btn--danger:hover{background:var(--danger-soft);border-color:var(--danger)}.btn--ghost{background:0 0}.btn--link{background:0 0;border:none;color:var(--primary);text-decoration:none;padding:6px 0;font-size:13px;font-weight:500}.btn--link:hover{background:0 0;text-decoration:underline}.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.alert{padding:10px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500}.alert--error{background:var(--danger-soft);color:var(--danger)}.alert--ok{background:var(--ok-soft);color:var(--ok)}.auth{display:grid;gap:14px;max-width:420px;margin:8px auto 0;width:100%}.auth h2{margin:0;font-size:22px;font-weight:700;letter-spacing:-.01em}.auth .actions{justify-content:flex-end}.auth .actions .btn{padding:10px 18px}.auth .btn--link{justify-self:center;margin-top:4px}.form{display:grid;gap:14px}.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 6px 6px 10px;background:var(--surface-2);border:1px solid var(--hairline);border-radius:var(--radius-md);flex-wrap:wrap}[dir=rtl] .nav{padding:6px 10px 6px 6px}.nav__user{display:flex;align-items:center;gap:10px;min-width:0}.nav__hello{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nav__links{display:flex;gap:4px;flex-wrap:wrap;align-items:center}.avatar{width:36px;he
